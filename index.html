document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:none\">\n  <header class=\"mast\">\n    <div class=\"mast-lhs\">\n      <div class=\"label\">Whiskythèque · Carnet du caviste · 2026<\u002Fdiv>\n      <h1><span>Index<\u002Fspan> <em>des<\u002Fem> <span>whiskies<\u002Fspan><\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"mast-rhs\">\n      Cinquante-deux bouteilles, lues comme on lit un livre&nbsp;: par ordre, par nez, par budget. Les noms tiennent lieu d'image.\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"stats\">\n    <div class=\"stat\"><div class=\"v\" id=\"s-total\">—<\u002Fdiv><div class=\"l\">Bouteilles<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat\"><div class=\"v\" id=\"s-regions\">—<\u002Fdiv><div class=\"l\">Régions<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat\"><div class=\"v\" id=\"s-tasted\">—<\u002Fdiv><div class=\"l\">Goûtés<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat\"><div class=\"v\" id=\"s-avg\">—<\u002Fdiv><div class=\"l\">Prix moyen<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"filters\">\n    <div class=\"frow\">\n      <span class=\"flabel\">Rechercher<\u002Fspan>\n      <div class=\"search\"><input id=\"q\" type=\"text\" placeholder=\"un nom, une note, un arôme…\"><\u002Fdiv>\n      <div class=\"budget\"><span>Budget ≤<\u002Fspan><input id=\"budget\" type=\"range\" min=\"15\" max=\"70\" value=\"70\"><output id=\"budget-out\">70€<\u002Foutput><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"frow\"><span class=\"flabel\">Régions<\u002Fspan><div class=\"chips\" id=\"regions\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"frow\"><span class=\"flabel\">Profil<\u002Fspan><div class=\"chips\" id=\"profiles\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"frow\">\n      <span class=\"flabel\">Carnet<\u002Fspan>\n      <div class=\"chips\" id=\"tasted-chips\">\n        <button class=\"chip on\" data-t=\"all\">Tous<\u002Fbutton>\n        <button class=\"chip\" data-t=\"new\">À découvrir<\u002Fbutton>\n        <button class=\"chip\" data-t=\"yes\">Goûtés<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"idx-meta\">\n    <div class=\"ct\"><b id=\"r-count\">0<\u002Fb> entrées · <span id=\"r-tasted\" style=\"color:var(--ink-mid)\">0 goûté<\u002Fspan><\u002Fdiv>\n    <div class=\"sort\" id=\"sort\">\n      <button class=\"on\" data-s=\"name\">A→Z<\u002Fbutton>\n      <button data-s=\"price\">Prix<\u002Fbutton>\n      <button data-s=\"qp\">Q/P<\u002Fbutton>\n      <button data-s=\"age\">Âge<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <main class=\"index\" id=\"index\"><\u002Fmain>\n\n  <footer class=\"foot\">\n    <div>Index typographique · variation 02<\u002Fdiv>\n    <div>Whiskythèque MMXXVI<\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<nav class=\"rail\" id=\"rail\"><\u002Fnav>\n\n<!-- PANEL -->\n<div class=\"scrim\" id=\"scrim\"><\u002Fdiv>\n<aside class=\"panel\" id=\"panel\" aria-hidden=\"true\">\n  <div class=\"panel-bar\">\n    <div class=\"crumb\">Fiche · <span id=\"f-crumb\">—<\u002Fspan><\u002Fdiv>\n    <button class=\"panel-close\" id=\"panel-close\" aria-label=\"Fermer\">×<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"panel-body\">\n    <div class=\"panel-hero\">\n      <span class=\"panel-region\" id=\"f-region\">—<\u002Fspan>\n      <h2 class=\"panel-name\" id=\"f-name\">—<\u002Fh2>\n      <p class=\"panel-tag\" id=\"f-tag\"><\u002Fp>\n    <\u002Fdiv>\n    <div class=\"panel-prim\">\n      <div class=\"panel-price\" id=\"f-price\">—<\u002Fdiv>\n      <div class=\"panel-qp\"><span id=\"f-qp-stars\" class=\"stars\">—<\u002Fspan><span>Rapport qualité/prix<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"panel-tasted\" id=\"f-tasted\"><span class=\"ck\"><\u002Fspan><span id=\"f-tasted-lbl\">Marquer goûté<\u002Fspan><\u002Fbutton>\n    <section class=\"panel-section\">\n      <div class=\"panel-section-h\">Profil aromatique<\u002Fdiv>\n      <div class=\"p-row\"><span class=\"p-lbl\">Tourbe<\u002Fspan><div class=\"p-track\"><div class=\"p-fill\" id=\"pf-peat\"><\u002Fdiv><\u002Fdiv><span class=\"p-val\" id=\"pv-peat\">0<\u002Fspan><\u002Fdiv>\n      <div class=\"p-row\"><span class=\"p-lbl\">Richesse<\u002Fspan><div class=\"p-track\"><div class=\"p-fill\" id=\"pf-rich\"><\u002Fdiv><\u002Fdiv><span class=\"p-val\" id=\"pv-rich\">0<\u002Fspan><\u002Fdiv>\n      <div class=\"p-row\"><span class=\"p-lbl\">Complexité<\u002Fspan><div class=\"p-track\"><div class=\"p-fill\" id=\"pf-comp\"><\u002Fdiv><\u002Fdiv><span class=\"p-val\" id=\"pv-comp\">0<\u002Fspan><\u002Fdiv>\n      <div class=\"p-row\"><span class=\"p-lbl\">Douceur<\u002Fspan><div class=\"p-track\"><div class=\"p-fill\" id=\"pf-sweet\"><\u002Fdiv><\u002Fdiv><span class=\"p-val\" id=\"pv-sweet\">0<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n    <section class=\"panel-section\">\n      <div class=\"panel-section-h\">Mots-clés aromatiques<\u002Fdiv>\n      <div class=\"tags\" id=\"f-tags\"><\u002Fdiv>\n    <\u002Fsection>\n    <section class=\"panel-section\">\n      <div class=\"panel-section-h\">Note du caviste<\u002Fdiv>\n      <p class=\"note-text\" id=\"f-note\">—<\u002Fp>\n    <\u002Fsection>\n  <\u002Fdiv>\n<\u002Faside>\n\n<script>\n/* ──────── DATA LOADING (CSV Google Sheets + fallback whiskies.json) ──────── */\nconst CSV_URL = 'https://docs.google.com/spreadsheets/d/1-EF3_HCFTVqKCjyUFuGmMqmZgt_hC7ZUKn3Qn1TAEUE/pub?output=csv';\nconst JSON_FALLBACK = 'whiskies.json';\n\nfunction parseCSVRows(text){\n  const rows=[],src=text.replace(/^\\uFEFF/,'');\n  let row=[],field='',inQ=false;\n  for(let i=0;i<src.length;i++){\n    const c=src[i],n=src[i+1];\n    if(c==='\"'){ if(inQ&&n==='\"'){field+='\"';i++}else inQ=!inQ; continue; }\n    if(c===','&&!inQ){row.push(field);field='';continue}\n    if((c==='\\n'||c==='\\r')&&!inQ){\n      if(c==='\\r'&&n==='\\n')i++;\n      row.push(field);field='';\n      if(row.some(v=>v!=='')) rows.push(row);\n      row=[];continue;\n    }\n    field+=c;\n  }\n  if(field.length||row.length){row.push(field);if(row.some(v=>v!=='')) rows.push(row)}\n  return rows;\n}\nfunction parseCSV(text){\n  const rows=parseCSVRows(text);\n  if(!rows.length) return [];\n  const headers=rows[0].map(h=>h.trim());\n  return rows.slice(1).map(r=>{\n    const o={};\n    headers.forEach((h,i)=>{\n      const v=(r[i]||'').trim();\n      if(h==='age') o[h]=v===''?null:parseInt(v,10)||null;\n      else if(['price','peat','rich','comp','sweet','qp'].includes(h)) o[h]=parseInt(v,10)||0;\n      else if(h==='tags') o[h]=v?v.split(',').map(t=>t.trim()).filter(Boolean):[];\n      else o[h]=v;\n    });\n    return o;\n  }).filter(w=>w.id&&w.name);\n}\nconst TAG_TO_REGION={'Français':'Autres','France':'Autres','Chinois':'Autres','Chine':'Autres'};\nconst FORCE_REGION={'glenturner':'Autres','lascaw17':'Autres','bankhal':'Autres'};\nfunction inferRegion(w){\n  if(w.region && w.region!=='Autres') return w.region;\n  if(FORCE_REGION[w.id]) return FORCE_REGION[w.id];\n  for(const t of (w.tags||[])){ if(TAG_TO_REGION[t]) return TAG_TO_REGION[t]; }\n  return 'Autres';\n}\nasync function loadDB(){\n  // Try Google Sheets CSV first\n  try{\n    const r=await fetch(CSV_URL);\n    if(r.ok){\n      const text=await r.text();\n      const data=parseCSV(text);\n      if(data.length) return data.map(w=>({...w, region: inferRegion(w)}));\n    }\n  }catch(e){}\n  // Fallback: inline data\n  try{\n    const el = document.getElementById('__whiskies_inline');\n    if(el){ const data = JSON.parse(el.textContent); return data.map(w=>({...w, region: inferRegion(w)})); }\n  }catch(e){}\n  // Last resort: whiskies.json\n  try{\n    const r=await fetch(JSON_FALLBACK);\n    if(r.ok){ const data=await r.json(); return data.map(w=>({...w, region: inferRegion(w)})); }\n  }catch(e){}\n  return [];\n}\n\n/* ──────── INIT (after data loaded) ──────── */\n(async ()=>{\n  const data = await loadDB();\n  if(!data.length){\n    document.getElementById('loader').innerHTML = '<div style=\"max-width:440px;padding:24px;border:1px solid var(--ink);background:var(--paper-hi);font-family:Newsreader,serif;font-style:italic;font-size:18px;color:var(--ink-soft);text-align:center\">Impossible de charger les données — ni le CSV Google Sheets ni le fichier <code>whiskies.json<\u002Fcode> local. Lancer via <code style=\"font-family:JetBrains Mono,monospace;font-size:0.85em\">python3 -m http.server<\u002Fcode>.<\u002Fdiv>';\n    return;\n  }\n  window.WHISKIES = data;\n  document.getElementById('loader').style.display='none';\n  document.getElementById('app').style.display='block';\n  bootApp();\n})();\n\nfunction bootApp(){\nconst TASTED_KEY='whisky.tasted.v1';\nconst REGIONS_ORDER=['Islay','Speyside','Highlands','Irlande','Japon','USA','Taïwan','Autres'];\nconst REGION_DOT={'Islay':'#3a5466','Speyside':'#5a6d3f','Highlands':'#8b5a2f','Irlande':'#4a7050','Japon':'#a06672','USA':'#9a6a2f','Taïwan':'#6e5a8a','Autres':'#6b6358'};\nconst PROFILES=[\n  {id:'all',label:'Tous',match:()=>true},\n  {id:'sweet',label:'Doux & sucré',match:w=>w.sweet>=65 && w.peat<25},\n  {id:'fruity',label:'Fruité',match:w=>/fruit|pêche|poire|tropical|pomme|citrus|orange|abricot/i.test(joinTags(w)) && w.peat<35},\n  {id:'sherry',label:'Sherry & rond',match:w=>/sherry|raisin sec|épices|cannelle|fruits noirs|chocolat/i.test(joinTags(w))},\n  {id:'maritime',label:'Maritime & iodé',match:w=>/maritime|sel|iod|algue|marin/i.test(joinTags(w))},\n  {id:'peat-l',label:'Tourbé léger',match:w=>w.peat>=30 && w.peat<70},\n  {id:'peat-h',label:'Tourbé intense',match:w=>w.peat>=70},\n  {id:'bourbon',label:'Bourbon',match:w=>w.region==='USA' || /bourbon|vanille|caramel/i.test(joinTags(w))}\n];\nfunction joinTags(w){return (w.tags||[]).join(' ')+' '+(w.note||'')}\nconst DB=window.WHISKIES;\nlet tasted=new Set(JSON.parse(localStorage.getItem(TASTED_KEY)||'[]'));\nconst state={query:'',region:'all',profile:'all',budget:70,tasted:'all',sort:'name',sortDir:1,selected:null};\n\nfunction visible(w){\n  if(state.region!=='all' && w.region!==state.region) return false;\n  if(w.price>state.budget) return false;\n  const p=PROFILES.find(x=>x.id===state.profile);\n  if(p && !p.match(w)) return false;\n  if(state.tasted==='yes' && !tasted.has(w.id)) return false;\n  if(state.tasted==='new' && tasted.has(w.id)) return false;\n  if(state.query){\n    const q=state.query.toLowerCase();\n    if(!(w.name+' '+w.region+' '+(w.tags||[]).join(' ')+' '+(w.note||'')).toLowerCase().includes(q)) return false;\n  }\n  return true;\n}\nfunction filtered(){\n  return DB.filter(visible).sort((a,b)=>{\n    const d=state.sortDir;\n    if(state.sort==='name') return d*a.name.localeCompare(b.name);\n    if(state.sort==='price') return d*(a.price-b.price);\n    if(state.sort==='qp') return d*(b.qp-a.qp);\n    if(state.sort==='age') return d*((b.age||0)-(a.age||0));\n    return 0;\n  });\n}\n\nfunction buildRegions(){\n  const counts={};DB.forEach(w=>counts[w.region]=(counts[w.region]||0)+1);\n  const el=document.getElementById('regions');\n  el.innerHTML='';\n  el.appendChild(makeChip('Tous','all',DB.length,state.region==='all',()=>{state.region='all';buildRegions();render()}));\n  REGIONS_ORDER.filter(r=>counts[r]).forEach(r=>{\n    el.appendChild(makeChip(r,r,counts[r],state.region===r,()=>{state.region=state.region===r?'all':r;buildRegions();render()}));\n  });\n}\nfunction buildProfiles(){\n  const el=document.getElementById('profiles');\n  el.innerHTML='';\n  PROFILES.forEach(p=>{\n    const ct = p.id==='all' ? DB.length : DB.filter(p.match).length;\n    el.appendChild(makeChip(p.label,p.id,ct,state.profile===p.id,()=>{state.profile=state.profile===p.id?'all':p.id;buildProfiles();render()}));\n  });\n}\nfunction makeChip(label,id,count,on,onClick){\n  const b=document.createElement('button');\n  b.className='chip'+(on?' on':'');\n  b.innerHTML=`${label}<span class=\"ct\">${count}<\u002Fspan>`;\n  b.addEventListener('click',onClick);\n  return b;\n}\n\nfunction render(){\n  const data=filtered();\n  document.getElementById('s-total').textContent=DB.length;\n  const regSet=new Set(data.map(w=>w.region));\n  document.getElementById('s-regions').textContent=regSet.size;\n  document.getElementById('s-tasted').textContent=tasted.size;\n  document.getElementById('s-avg').textContent=data.length?Math.round(data.reduce((s,w)=>s+w.price,0)/data.length)+'€':'—';\n  document.getElementById('r-count').textContent=data.length;\n  const tk=data.filter(w=>tasted.has(w.id)).length;\n  document.getElementById('r-tasted').textContent=`${tk} goûté${tk>1?'s':''}`;\n\n  const host=document.getElementById('index');\n  host.innerHTML='';\n  if(!data.length){host.innerHTML=`<div class=\"empty\">— rien à servir avec ces filtres —<\u002Fdiv>`;buildRail([]);return}\n  data.forEach((w,i)=>host.appendChild(makeRow(w,i)));\n  buildRail(data);\n  // observe entrances\n  const io=new IntersectionObserver(entries=>{\n    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in-view');io.unobserve(e.target)}});\n  },{rootMargin:'-50px 0px -10% 0px',threshold:0.05});\n  document.querySelectorAll('.row').forEach(r=>io.observe(r));\n}\n\nfunction makeRow(w,i){\n  const r=document.createElement('article');\n  r.className='row'+(tasted.has(w.id)?' tasted':'');\n  r.style.setProperty('--c',REGION_DOT[w.region]||'#6b6358');\n  r.dataset.letter=(w.name[0]||'?').toUpperCase();\n  const tagsHtml=(w.tags||[]).slice(0,4).map(t=>`<span class=\"row-tag\">${t}<\u002Fspan>`).join('');\n  r.innerHTML=`\n    <div class=\"row-num\">\n      <span class=\"n\">№ ${String(i+1).padStart(2,'0')}<\u002Fspan>\n      <span class=\"r\">${w.region}<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"row-name-block\">\n      <h2 class=\"row-name\">${w.name}<\u002Fh2>\n      <div class=\"row-tags\">${tagsHtml}<\u002Fdiv>\n      <p class=\"row-note\">${(w.note||'').slice(0,180)}${(w.note||'').length>180?'…':''}<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"row-aside\">\n      <div class=\"row-meta-grid\">\n        <div class=\"row-meta-cell\"><div class=\"l\">Âge<\u002Fdiv><div class=\"v\">${w.age?w.age:'—'}${w.age?'<em>ans<\u002Fem>':''}<\u002Fdiv><\u002Fdiv>\n        <div class=\"row-meta-cell\"><div class=\"l\">Prix<\u002Fdiv><div class=\"v\">${w.price}<em>€<\u002Fem><\u002Fdiv><\u002Fdiv>\n        <div class=\"row-meta-cell\"><div class=\"l\">Q/P<\u002Fdiv><div class=\"v\">${'★'.repeat(w.qp)}<span style=\"color:var(--ink-faint)\">${'★'.repeat(3-w.qp)}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row-bars\">\n        <div class=\"row-bar\"><span>Tourbe<\u002Fspan><div class=\"row-bar-track\"><div class=\"row-bar-fill\" style=\"--w:${w.peat}%\"><\u002Fdiv><\u002Fdiv><span class=\"row-bar-val\">${w.peat}<\u002Fspan><\u002Fdiv>\n        <div class=\"row-bar\"><span>Richesse<\u002Fspan><div class=\"row-bar-track\"><div class=\"row-bar-fill\" style=\"--w:${w.rich}%\"><\u002Fdiv><\u002Fdiv><span class=\"row-bar-val\">${w.rich}<\u002Fspan><\u002Fdiv>\n        <div class=\"row-bar\"><span>Douceur<\u002Fspan><div class=\"row-bar-track\"><div class=\"row-bar-fill\" style=\"--w:${w.sweet}%\"><\u002Fdiv><\u002Fdiv><span class=\"row-bar-val\">${w.sweet}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row-actions\">\n        <button class=\"row-check${tasted.has(w.id)?' on':''}\" data-tasted aria-label=\"Marquer goûté\"><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n  r.addEventListener('click',e=>{\n    if(e.target.closest('[data-tasted]')) return;\n    openPanel(w.id);\n  });\n  r.querySelector('[data-tasted]').addEventListener('click',e=>{e.stopPropagation();toggleTasted(w.id)});\n  return r;\n}\n\nfunction buildRail(data){\n  const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');\n  const has=new Set(data.map(w=>(w.name[0]||'').toUpperCase()));\n  const el=document.getElementById('rail');el.innerHTML='';\n  letters.forEach(L=>{\n    const b=document.createElement('button');\n    b.className=has.has(L)?'has':'';\n    b.textContent=L;\n    b.addEventListener('click',()=>{\n      const target=document.querySelector(`.row[data-letter=\"${L}\"]`);\n      if(target) target.scrollIntoView({behavior:'smooth',block:'start'});\n    });\n    el.appendChild(b);\n  });\n}\n\nfunction toggleTasted(id){\n  if(tasted.has(id)) tasted.delete(id); else tasted.add(id);\n  localStorage.setItem(TASTED_KEY,JSON.stringify([...tasted]));\n  render();\n  if(state.selected===id) syncPanelTasted();\n}\nfunction syncPanelTasted(){\n  const on=tasted.has(state.selected);\n  document.getElementById('f-tasted').classList.toggle('on',on);\n  document.getElementById('f-tasted-lbl').textContent=on?'Goûté · décocher':'Marquer goûté';\n}\n\nfunction openPanel(id){\n  const w=DB.find(x=>x.id===id);if(!w) return;\n  state.selected=id;\n  document.getElementById('f-crumb').textContent=w.region;\n  document.getElementById('f-region').textContent=w.region;\n  document.getElementById('f-name').textContent=w.name;\n  document.getElementById('f-tag').textContent=(w.tags||[]).slice(0,3).join(' · ');\n  document.getElementById('f-price').innerHTML=`${w.price}<em>€<\u002Fem>`;\n  document.getElementById('f-qp-stars').textContent='★'.repeat(w.qp)+'☆'.repeat(3-w.qp);\n  document.getElementById('f-tags').innerHTML=(w.tags||[]).map(t=>`<span class=\"tag\">${t}<\u002Fspan>`).join('');\n  document.getElementById('f-note').textContent=w.note||'—';\n  ['peat','rich','comp','sweet'].forEach((k,i)=>{\n    document.getElementById('pf-'+k).style.width='0';\n    document.getElementById('pv-'+k).textContent='0';\n    setTimeout(()=>{\n      document.getElementById('pf-'+k).style.width=w[k]+'%';\n      animateNum('pv-'+k,w[k]);\n    },80+i*70);\n  });\n  syncPanelTasted();\n  document.getElementById('panel').classList.add('on');\n  document.getElementById('scrim').classList.add('on');\n  document.body.style.overflow='hidden';\n}\nfunction animateNum(id,n){\n  const el=document.getElementById(id);\n  const start=performance.now(),dur=500;\n  function step(t){\n    const p=Math.min(1,(t-start)/dur);\n    el.textContent=Math.round(n*(1-Math.pow(1-p,3)));\n    if(p<1) requestAnimationFrame(step);\n  }\n  requestAnimationFrame(step);\n}\nfunction closePanel(){\n  document.getElementById('panel').classList.remove('on');\n  document.getElementById('scrim').classList.remove('on');\n  state.selected=null;\n  document.body.style.overflow='';\n}\ndocument.getElementById('panel-close').addEventListener('click',closePanel);\ndocument.getElementById('scrim').addEventListener('click',closePanel);\ndocument.getElementById('f-tasted').addEventListener('click',()=>{if(state.selected) toggleTasted(state.selected)});\ndocument.addEventListener('keydown',e=>{if(e.key==='Escape') closePanel()});\n\ndocument.getElementById('q').addEventListener('input',e=>{state.query=e.target.value;render()});\ndocument.getElementById('sort').addEventListener('click',e=>{\n  const b=e.target.closest('button');if(!b) return;\n  if(state.sort===b.dataset.s) state.sortDir=-state.sortDir;\n  else {state.sort=b.dataset.s;state.sortDir=1}\n  document.querySelectorAll('#sort button').forEach(x=>x.classList.toggle('on',x===b));\n  render();\n});\ndocument.getElementById('tasted-chips').addEventListener('click',e=>{\n  const b=e.target.closest('button');if(!b) return;\n  document.querySelectorAll('#tasted-chips button').forEach(x=>x.classList.toggle('on',x===b));\n  state.tasted=b.dataset.t;render();\n});\nconst budget=document.getElementById('budget'),budgetOut=document.getElementById('budget-out');\nbudget.addEventListener('input',()=>{state.budget=+budget.value;budgetOut.textContent=budget.value+'€';render()});\n\nbuildRegions();buildProfiles();render();\n} /* /bootApp */\n<\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
